<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="html(content, styles, scripts)" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' — HRM Group 117'">HRM Group 117</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <style>
        :root {
            --pri:    #FF6B35;
            --pri-s:  #FFF0EB;
            --pri-d:  #e55a25;
            --bg:     #F4F6F9;
            --card:   #fff;
            --ok:     #10B981;
            --ok-s:   #ECFDF5;
            --warn:   #F59E0B;
            --warn-s: #FFFBEB;
            --err:    #EF4444;
            --err-s:  #FEF2F2;
            --inf:    #3B82F6;
            --inf-s:  #EFF6FF;
            --teal:   #0D9488;
            --teal-s: #F0FDFA;
            --txt:    #1F2937;
            --txt2:   #6B7280;
            --border: #E5E7EB;
            --sidebar-w: 240px;
            --header-h:  48px;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(0,0,0,.07);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--txt);
            min-height: 100vh;
            display: flex;
        }

        /* ────────────────────────────────────────────────────────────────── */
        /* SIDEBAR */
        /* ────────────────────────────────────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-w);
            background: #fff;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            z-index: 100;
            box-shadow: 2px 0 8px rgba(0,0,0,.05);
        }

        .sidebar-logo {
            height: var(--header-h);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--pri);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 16px;
        }

        .sidebar-logo span {
            font-weight: 800;
            font-size: 15px;
            color: var(--txt);
        }

        .sidebar-logo span em {
            color: var(--pri);
            font-style: normal;
        }

        /* Sidebar Navigation */
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }

        .sidebar-nav::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-nav::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-nav::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        .nav-section {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--txt2);
            padding: 10px 20px 4px;
            margin-top: 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 20px;
            font-size: 13.5px;
            font-weight: 600;
            color: var(--txt2);
            border-left: 3px solid transparent;
            text-decoration: none;
            transition: all .18s;
        }

        .nav-item i {
            width: 18px;
            text-align: center;
            font-size: 14px;
        }

        .nav-item:hover {
            color: var(--pri);
            background: var(--pri-s);
        }

        .nav-item.active {
            color: var(--pri);
            background: var(--pri-s);
            border-left-color: var(--pri);
            font-weight: 700;
        }

        .sidebar-footer {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            background: #fafafa;
        }

        .s-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--pri);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #fff;
            font-size: 13px;
        }

        .s-uname {
            font-size: 13px;
            font-weight: 700;
            color: var(--txt);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .s-role  {
            font-size: 11px;
            color: var(--txt2);
        }

        .logout-btn {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--txt2);
            font-size: 16px;
            transition: color .18s;
            padding: 4px;
        }

        .logout-btn:hover {
            color: var(--err);
        }

        /* ────────────────────────────────────────────────────────────────── */
        /* MAIN CONTENT */
        /* ────────────────────────────────────────────────────────────────── */
        .main-wrap {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ────────────────────────────────────────────────────────────────── */
        /* TOPBAR */
        /* ────────────────────────────────────────────────────────────────── */
        .topbar {
            flex-shrink: 0;
            min-height: var(--header-h);
            height: var(--header-h);
            max-height: var(--header-h);
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: stretch;
            padding: 0 18px;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 1px 2px rgba(0,0,0,.04);
            box-sizing: border-box;
        }

        .topbar-inner {
            display: flex;
            align-items: center;
            width: 100%;
            min-height: var(--header-h);
            height: 100%;
            gap: 12px;
            box-sizing: border-box;
        }

        .topbar-title-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1 1 auto;
            min-width: 0;
        }

        .page-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--txt);
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .page-sep {
            color: var(--border);
        }

        .page-cur {
            font-size: 13px;
            color: var(--pri);
            font-weight: 600;
        }

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--txt2);
            font-size: 14px;
            cursor: pointer;
            position: relative;
            transition: all .18s;
        }

        .icon-btn:hover {
            background: var(--pri-s);
            color: var(--pri);
            border-color: var(--pri-s);
        }

        .notif-wrap {
            position: relative;
        }

        .notif-dot {
            display: none;
            position: absolute;
            top: 5px;
            right: 5px;
            width: 6px;
            height: 6px;
            background: var(--err);
            border-radius: 50%;
            border: 1.5px solid #fff;
        }

        .notif-dot.show {
            display: block;
        }

        .notif-dropdown {
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            width: min(360px, 92vw);
            max-height: 380px;
            overflow-y: auto;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,.12);
            z-index: 2000;
            display: none;
        }

        .notif-dropdown.open {
            display: block;
        }

        .notif-dd-hd {
            padding: 12px 14px;
            font-size: 12px;
            font-weight: 800;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notif-item {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            cursor: pointer;
        }

        .notif-item:hover {
            background: var(--pri-s);
        }

        .notif-item-title {
            font-weight: 800;
            color: var(--txt);
            margin-bottom: 4px;
        }

        .notif-item-meta {
            font-size: 11px;
            color: var(--txt2);
        }

        .t-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--pri);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
        }

        /* ────────────────────────────────────────────────────────────────── */
        /* PAGE CONTENT */
        /* ────────────────────────────────────────────────────────────────── */
        .page-content {
            padding: 16px 20px 20px;
            flex: 1;
            overflow-y: auto;
        }

        .page-content::-webkit-scrollbar {
            width: 8px;
        }

        .page-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .page-content::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 4px;
        }

        /* ────────────────────────────────────────────────────────────────── */
        /* RESPONSIVE */
        /* ────────────────────────────────────────────────────────────────── */
        @media (max-width: 768px) {
            :root {
                --sidebar-w: 0;
            }

            .sidebar {
                transform: translateX(-100%);
                transition: transform .3s;
                box-shadow: 2px 0 12px rgba(0,0,0,.15);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .page-content {
                padding: 16px;
            }

            .topbar {
                padding: 0 12px;
            }
        }
    </style>

 
    <th:block th:replace="${styles}"></th:block>
</head>
<body>

    <!-- ════════════════════════════════════════════════════════════════════ -->
    <!-- SIDEBAR -->
    <!-- ════════════════════════════════════════════════════════════════════ -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">H</div>
            <span>HRM <em>Group</em></span>
        </div>

        <nav class="sidebar-nav" th:replace="~{fragments/sidebar :: nav-items}"></nav>

        <div class="sidebar-footer">
            <div class="s-avatar" th:text="${#strings.substring(username, 0, 1).toUpperCase()}"></div>
            <div>
                <div class="s-uname" th:text="${username}"></div>
                <div class="s-role" th:text="${role}"></div>
            </div>
            <button class="logout-btn" onclick="logout()" title="Đăng xuất">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </aside>

    <!-- ════════════════════════════════════════════════════════════════════ -->
    <!-- MAIN CONTENT AREA -->
    <!-- ════════════════════════════════════════════════════════════════════ -->
    <div class="main-wrap">

        <!-- TOPBAR -->
        <header class="topbar" th:insert="~{fragments/topbar :: topbar}"></header>

        <!-- PAGE CONTENT -->
        <main class="page-content">
            <th:block th:replace="${content}"></th:block>
        </main>

    </div>

    <!-- ════════════════════════════════════════════════════════════════════ -->
    <!-- GLOBAL SCRIPTS -->
    <!-- ════════════════════════════════════════════════════════════════════ -->
    <script>
        // ──────────────────────────────────────────────────────────────
        // JWT helper
        // ──────────────────────────────────────────────────────────────
        function getJwtToken() {
            // Ưu tiên URL token để tránh dùng token cũ trong sessionStorage
            const params = new URL(window.location.href).searchParams;
            const fromUrl = params.get('access_token');
            if (fromUrl && fromUrl !== 'null' && fromUrl !== 'undefined') {
                sessionStorage.setItem('token', fromUrl);
                return fromUrl;
            }

            // Fallback sessionStorage
            const fromSession = sessionStorage.getItem('token');
            if (fromSession && fromSession !== 'null' && fromSession !== 'undefined') return fromSession;

            // Fallback cookie (giữ tương thích nếu còn phần luồng cũ)
            const m = document.cookie.match('(^|;)\\s*jwt_token\\s*=\\s*([^;]+)');
            return m ? decodeURIComponent(m.pop()) : null;
        }

        function getAuthHeaders() {
            const token = getJwtToken();
            const headers = new Headers({ 'Accept': 'application/json', 'Content-Type': 'application/json' });
            if (token) {
                headers.append('Authorization', 'Bearer ' + token);
            }
            return headers;
        }

        // ──────────────────────────────────────────────────────────────
        // Logout function
        // ──────────────────────────────────────────────────────────────
        function logout() {
            if (!confirm('Bạn có chắc muốn đăng xuất?')) return;

            // Xóa token khỏi sessionStorage (mỗi tab độc lập)
            sessionStorage.removeItem('token');
            sessionStorage.removeItem('role');
            sessionStorage.removeItem('username');

            // Xóa cookie jwt_token
            document.cookie = 'jwt_token=; path=/; Max-Age=0; SameSite=Strict';

            console.log('>>> Đã đăng xuất');

            // Redirect về login
            window.location.href = '/login';
        }

        // ──────────────────────────────────────────────────────────────
        // Giữ access_token trên tất cả link dashboard (tránh phụ thuộc cookie chung)
        // ──────────────────────────────────────────────────────────────
        function ensureTokenOnDashboardLinks() {
            const token =
                sessionStorage.getItem('token') ||
                new URL(window.location.href).searchParams.get('access_token');
            if (!token || token === 'null' || token === 'undefined') return;

            document.querySelectorAll('a[href]').forEach(a => {
                const href = a.getAttribute('href');
                if (!href) return;

                try {
                    const u = new URL(href, window.location.origin);
                    if (!u.pathname.startsWith('/dashboard')) return;
                    if (!u.searchParams.has('access_token')) {
                        u.searchParams.set('access_token', token);
                        a.setAttribute('href', u.pathname + u.search);
                    }
                } catch (e) {
                    // ignore invalid href
                }
            });
        }

        document.addEventListener('DOMContentLoaded', ensureTokenOnDashboardLinks);

        // ──────────────────────────────────────────────────────────────
        // Mobile sidebar toggle (nếu cần)
        // ──────────────────────────────────────────────────────────────
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            if (sidebar) {
                sidebar.classList.toggle('active');
            }
        }

        // ──────────────────────────────────────────────────────────────
        // Generic toast notification
        // ──────────────────────────────────────────────────────────────
        function toast(message, type = 'info', duration = 3000) {
            const toastId = 'toast-' + Date.now();
            const typeClasses = {
                'success': 'background: #10B981; color: white;',
                'error': 'background: #EF4444; color: white;',
                'warning': 'background: #F59E0B; color: white;',
                'info': 'background: #3B82F6; color: white;'
            };

            const toastHTML = `
                <div id="${toastId}" style="${typeClasses[type] || typeClasses.info}
                    padding: 12px 16px; border-radius: 8px; font-size: 13px;
                    font-weight: 600; display: flex; align-items: center; gap: 10px;
                    box-shadow: 0 4px 12px rgba(0,0,0,.15);
                    animation: slideInRight .3s ease-out;">
                    <span>${message}</span>
                    <button onclick="document.getElementById('${toastId}').remove()"
                        style="background: none; border: none; color: inherit; cursor: pointer; font-size: 16px; padding: 0; margin: 0;">
                        ×
                    </button>
                </div>
            `;

            const container = document.getElementById('toast-container') || createToastContainer();
            container.insertAdjacentHTML('beforeend', toastHTML);

            if (duration > 0) {
                setTimeout(() => {
                    const elem = document.getElementById(toastId);
                    if (elem) {
                        elem.style.animation = 'slideOutRight .3s ease-out';
                        setTimeout(() => elem.remove(), 300);
                    }
                }, duration);
            }
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.id = 'toast-container';
            container.style.cssText = `
                position: fixed; top: 20px; right: 20px; z-index: 1000;
                display: flex; flex-direction: column; gap: 10px;
                max-width: 400px;
            `;
            document.body.appendChild(container);
            return container;
        }

        // Animation keyframes
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from {
                    opacity: 0;
                    transform: translateX(100%);
                }
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }
            @keyframes slideOutRight {
                from {
                    opacity: 1;
                    transform: translateX(0);
                }
                to {
                    opacity: 0;
                    transform: translateX(100%);
                }
            }
        `;
        document.head.appendChild(style);
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js" crossorigin="anonymous"></script>
    <div id="hrm-ws-meta" th:attr="data-role=${role}" style="display:none"></div>

    <script>
        (function () {
            const meta = document.getElementById('hrm-ws-meta');
            const role = meta ? (meta.getAttribute('data-role') || '').toUpperCase() : '';
            if (!['ADMIN', 'HR', 'EMPLOYEE', 'DIRECTOR'].includes(role)) return;

            function showNotifDot(show) {
                const d = document.getElementById('notifDot');
                if (!d) return;
                if (show) d.classList.add('show'); else d.classList.remove('show');
            }

            function handleWsPayload(payload) {
                let dto = payload;
                if (typeof payload === 'string') {
                    try { dto = JSON.parse(payload); } catch (e) { return; }
                }
                const title = (dto && dto.tieuDe) ? dto.tieuDe : 'Thông báo';
                const body = (dto && dto.noiDung) ? dto.noiDung : '';
                const unread = (dto && dto.loai === 'SYSTEM_BROADCAST') || (dto && dto.daDoc === false) || true;
                if (typeof toast === 'function') {
                    toast(title + (body ? ': ' + body : ''), 'success', 5000);
                }
                showNotifDot(true);
            }

            async function syncUnread() {
                try {
                    const r = await fetch('/api/notifications/unread-count', { headers: getAuthHeaders() });
                    if (!r.ok) return;
                    const j = await r.json();
                    showNotifDot((j.unread || 0) > 0);
                } catch (e) { /* ignore */ }
            }

            async function loadNotifList() {
                const body = document.getElementById('notifListBody');
                if (!body) return;
                try {
                    const r = await fetch('/api/notifications?limit=30', { headers: getAuthHeaders() });
                    if (!r.ok) { body.innerHTML = '<div class="notif-item">Không tải được danh sách</div>'; return; }
                    const list = await r.json();
                    if (!list.length) {
                        body.innerHTML = '<div class="notif-item" style="color:var(--txt2)">Không có thông báo</div>';
                        return;
                    }
                    const esc = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
                    body.innerHTML = list.map(n => {
                        const unread = n.nguoiNhan && !n.daDoc;
                        const st = n.ngayTao ? String(n.ngayTao).replace('T', ' ').substring(0, 16) : '';
                        const tag = n.nguoiNhan ? (' data-id="' + n.id + '"') : '';
                        const bc = n.nguoiNhan ? '' : ' <span style="font-size:10px;color:var(--pri)">(chung)</span>';
                        return '<div class="notif-item"' + tag + ' style="' + (unread ? 'background:#FFF7ED' : '') + '">' +
                            '<div class="notif-item-title">' + esc(n.tieuDe) + bc + '</div>' +
                            '<div style="margin:4px 0;color:var(--txt2)">' + esc(n.noiDung) + '</div>' +
                            '<div class="notif-item-meta">' + esc(n.loai) + (st ? ' · ' + esc(st) : '') + '</div></div>';
                    }).join('');
                    body.querySelectorAll('.notif-item[data-id]').forEach(el => {
                        el.addEventListener('click', async () => {
                            const id = el.getAttribute('data-id');
                            try {
                                const r = await fetch('/api/notifications/' + id + '/read', { method: 'PUT', headers: getAuthHeaders() });
                                if (r.ok) { el.style.background = ''; syncUnread(); }
                            } catch (e) { }
                        });
                    });
                } catch (e) {
                    body.innerHTML = '<div class="notif-item">Lỗi mạng</div>';
                }
            }

            function initNotifUi() {
                const bell = document.getElementById('notifBellBtn');
                const dd = document.getElementById('notifDropdown');
                const markAll = document.getElementById('notifMarkAllRead');
                if (bell && dd) {
                    bell.addEventListener('click', (ev) => {
                        ev.stopPropagation();
                        const open = dd.classList.toggle('open');
                        bell.setAttribute('aria-expanded', open ? 'true' : 'false');
                        if (open) loadNotifList();
                    });
                    document.addEventListener('click', () => { dd.classList.remove('open'); bell.setAttribute('aria-expanded', 'false'); });
                    dd.addEventListener('click', (e) => e.stopPropagation());
                }
                if (markAll) {
                    markAll.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        try {
                            await fetch('/api/notifications/read-all', { method: 'PUT', headers: getAuthHeaders() });
                            loadNotifList();
                            syncUnread();
                        } catch (err) { }
                    });
                }
            }

            function connectStomp() {
                const token = typeof getJwtToken === 'function' ? getJwtToken() : null;
                if (!token) return;
                const socket = new SockJS('/ws');
                const stompClient = Stomp.over(socket);
                stompClient.debug = function () { };
                stompClient.connect(
                    { Authorization: 'Bearer ' + token },
                    function () {
                        stompClient.subscribe('/topic/notifications', function (msg) {
                            handleWsPayload(msg.body);
                            syncUnread();
                        });
                        stompClient.subscribe('/user/queue/notifications', function (msg) {
                            handleWsPayload(msg.body);
                            syncUnread();
                        });
                    },
                    function () {
                        console.warn('STOMP lỗi / ngắt — thử kết nối lại sau 8s');
                        setTimeout(connectStomp, 8000);
                    }
                );
            }

            document.addEventListener('DOMContentLoaded', function () {
                initNotifUi();
                syncUnread();
                connectStomp();
            });
        })();
    </script>

    <th:block th:replace="${scripts}"></th:block>

</body>
</html>
