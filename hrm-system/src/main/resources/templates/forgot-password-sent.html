<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kiểm Tra Email — HRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #F4F6F9; font-family: 'Nunito', sans-serif; }
        .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 420px; border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.10); }
        .login-header { background: #FF6B35; border-radius: 16px 16px 0 0; padding: 28px 24px 22px; text-align: center; }
        .login-header h3 { color: #fff; font-weight: 800; font-size: 22px; margin: 0; letter-spacing: -0.3px; }
        .login-body { padding: 28px 28px 24px; text-align: center; }
        .mail-icon { font-size: 54px; line-height: 1; margin-bottom: 14px; }
        .info-text { font-size: 14px; color: #374151; margin-bottom: 8px; }
        .btn-login { background: #FF6B35; border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 700; padding: 11px; width: 100%; transition: background 0.15s; cursor: pointer; display: inline-block; text-decoration: none; }
        .btn-login:hover { background: #e55a25; color: #fff; }
        .back-link { color: #FF6B35; font-size: 13px; font-weight: 600; text-decoration: none; }
        .back-link:hover { text-decoration: underline; color: #e55a25; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card card">
        <div class="login-header">
            <h3>✉️ Kiểm Tra Email</h3>
        </div>
        <div class="login-body">
            <div class="mail-icon">✉️</div>
            <p class="info-text mb-1">Mã OTP đã được gửi đến email công việc của bạn.</p>
            <p class="info-text mb-1">Mã có hiệu lực trong 15 phút.</p>
            <p class="info-text mb-4">Vui lòng kiểm tra hộp thư và nhập mã để đặt lại mật khẩu.</p>
            <a href="/reset-password" class="btn-login">Nhập mã OTP</a>
            <div class="mt-3">
                <a href="/login" class="back-link">Quay lại đăng nhập</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
