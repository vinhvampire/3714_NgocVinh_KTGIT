<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên Mật Khẩu — HRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #F4F6F9; font-family: 'Nunito', sans-serif; }
        .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 420px; border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.10); }
        .login-header { background: #FF6B35; border-radius: 16px 16px 0 0; padding: 28px 24px 22px; text-align: center; }
        .login-header h3 { color: #fff; font-weight: 800; font-size: 22px; margin: 0; letter-spacing: -0.3px; }
        .login-header p { color: rgba(255,255,255,0.8); font-size: 13px; margin: 6px 0 0; }
        .login-body { padding: 28px 28px 24px; }
        .form-label { font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 6px; }
        .form-control { border-radius: 8px; border: 1.5px solid #E5E7EB; font-size: 14px; padding: 10px 14px; transition: border-color 0.15s; }
        .form-control:focus { border-color: #FF6B35; box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.12); }
        .btn-login { background: #FF6B35; border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 700; padding: 11px; width: 100%; transition: background 0.15s; cursor: pointer; }
        .btn-login:hover:not(:disabled) { background: #e55a25; }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
        #errorMessage { display: none; font-size: 13px; border-radius: 8px; }
        .back-link { color: #FF6B35; font-size: 13px; font-weight: 600; text-decoration: none; }
        .back-link:hover { text-decoration: underline; color: #e55a25; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card card">
        <div class="login-header">
            <h3>🔐 Quên Mật Khẩu</h3>
            <p>Nhập tên đăng nhập để nhận mã OTP</p>
        </div>
        <div class="login-body">
            <div id="errorMessage" class="alert alert-danger mb-3"></div>
            <form id="forgotForm" novalidate>
                <div class="mb-4">
                    <label class="form-label" for="username">Tên đăng nhập</label>
                    <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập" autocomplete="username" required>
                </div>
                <button type="submit" class="btn-login" id="btnSubmit">Gửi mã OTP</button>
            </form>
            <div class="mt-3 text-center">
                <a href="/login" class="back-link">Quay lại đăng nhập</a>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById('forgotForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const errorDiv = document.getElementById('errorMessage');
        const btn = document.getElementById('btnSubmit');
        errorDiv.style.display = 'none';
        errorDiv.textContent = '';

        if (!username) {
            errorDiv.textContent = '⚠️ Vui lòng nhập tên đăng nhập.';
            errorDiv.style.display = 'block';
            return;
        }

        btn.disabled = true;
        try {
            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            if (!res.ok) {
                const j = await res.json().catch(() => ({}));
                throw new Error(j.message || 'Không thể gửi mã OTP.');
            }
            window.location.href = '/forgot-password/sent';
        } catch (err) {
            errorDiv.textContent = '⚠️ ' + (err.message || 'Lỗi kết nối.');
            errorDiv.style.display = 'block';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
