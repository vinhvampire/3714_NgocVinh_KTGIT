<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt Lại Mật Khẩu — HRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #F4F6F9; font-family: 'Nunito', sans-serif; }
        .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 420px; border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.10); }
        .login-header { background: #FF6B35; border-radius: 16px 16px 0 0; padding: 28px 24px 22px; text-align: center; }
        .login-header h3 { color: #fff; font-weight: 800; font-size: 22px; margin: 0; letter-spacing: -0.3px; }
        .login-body { padding: 28px 28px 24px; }
        .form-label { font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 6px; }
        .form-control { border-radius: 8px; border: 1.5px solid #E5E7EB; font-size: 14px; padding: 10px 14px; transition: border-color 0.15s; }
        .form-control:focus { border-color: #FF6B35; box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.12); }
        .btn-login { background: #FF6B35; border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 700; padding: 11px; width: 100%; transition: background 0.15s; cursor: pointer; }
        .btn-login:hover:not(:disabled) { background: #e55a25; }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
        #errorMessage { display: none; font-size: 13px; border-radius: 8px; }
        #successMessage { display: none; font-size: 13px; border-radius: 8px; }
        .back-link { color: #FF6B35; font-size: 13px; font-weight: 600; text-decoration: none; }
        .back-link:hover { text-decoration: underline; color: #e55a25; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card card">
        <div class="login-header">
            <h3>🔁 Đặt Lại Mật Khẩu</h3>
        </div>
        <div class="login-body">
            <div id="errorMessage" class="alert alert-danger mb-3"></div>
            <div id="successMessage" class="alert alert-success mb-3"></div>
            <form id="resetForm" novalidate>
                <div class="mb-3">
                    <label class="form-label" for="username">Tên đăng nhập</label>
                    <input type="text" id="username" class="form-control" autocomplete="username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="otp">Mã OTP (6 số)</label>
                    <input type="text" id="otp" class="form-control" maxlength="6" inputmode="numeric" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="newPassword">Mật khẩu mới</label>
                    <input type="password" id="newPassword" class="form-control" autocomplete="new-password" required>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="confirmPassword">Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirmPassword" class="form-control" autocomplete="new-password" required>
                </div>
                <button type="submit" class="btn-login" id="btnSubmit">Đặt Lại Mật Khẩu</button>
            </form>
            <div class="mt-3 text-center">
                <a href="/login" class="back-link">Quay lại đăng nhập</a>
            </div>
        </div>
    </div>
</div>
<script>
    const resetForm = document.getElementById('resetForm');
    const otpInput = document.getElementById('otp');

    // Tự động focus vào ô OTP để nhập nhanh
    window.addEventListener('load', function () {
        otpInput.focus();
    });

    // Chỉ giữ lại chữ số và tối đa 6 ký tự khi gõ/dán
    otpInput.addEventListener('input', function () {
        otpInput.value = otpInput.value.replace(/\D/g, '').slice(0, 6);
    });

    resetForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const otp = otpInput.value.trim();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const btn = document.getElementById('btnSubmit');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        errorDiv.textContent = '';
        successDiv.textContent = '';

        if (!username || !otp || !newPassword || !confirmPassword) {
            showError('Vui lòng nhập đầy đủ thông tin.');
            return;
        }
        if (!/^\d{6}$/.test(otp)) {
            showError('OTP phải gồm đúng 6 chữ số.');
            return;
        }
        if (newPassword.length < 6) {
            showError('Mật khẩu mới tối thiểu 6 ký tự.');
            return;
        }
        if (newPassword !== confirmPassword) {
            showError('Xác nhận mật khẩu không khớp.');
            return;
        }

        btn.disabled = true;
        try {
            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, otp, newPassword })
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                throw new Error(data.message || 'Không thể đặt lại mật khẩu.');
            }

            successDiv.textContent = '✅ Mật khẩu đã được đặt lại!';
            successDiv.style.display = 'block';
            setTimeout(function () {
                window.location.href = '/login';
            }, 2000);
        } catch (err) {
            showError(err.message || 'Lỗi kết nối.');
            btn.disabled = false;
        }

        function showError(msg) {
            errorDiv.textContent = '⚠️ ' + msg;
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
