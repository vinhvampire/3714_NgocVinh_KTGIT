<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/dashboard-layout :: html(content=~{::page-content}, styles=~{dashboard/hr :: custom-styles}, scripts=~{::custom-scripts})}"
      lang="vi">
<head>
    <title>HR - Phòng ban</title>
</head>
<body>

<th:block th:fragment="page-content">

    <div class="hr-banner">
        <div class="hb-left">
            <h2><i class="fa-solid fa-folder-tree" style="margin-right:8px;opacity:.8"></i>Quản lý phòng ban</h2>
            <p>Gán phòng ban theo chi nhánh.</p>
            <div class="hb-date" id="dateTime">...</div>
        </div>
    </div>

    <th:block th:replace="~{fragments/hr-subnav :: subnav}"></th:block>
    <th:block th:replace="~{fragments/hr-org-subnav :: org-subnav}"></th:block>

    <div class="g2" style="align-items:start">
        <div class="card">
            <div class="card-hd">
                <div class="card-title"><i class="fa-solid fa-plus" style="color:var(--hr);margin-right:6px"></i>Thêm phòng ban</div>
            </div>
            <form id="formAddPB">
                <label class="modal-sub" style="display:block;margin-bottom:6px">Tên phòng ban</label>
                <input type="text" class="modal-textarea" id="tenPB" required placeholder="VD: Phòng IT"
                       style="margin-bottom:10px;width:100%;box-sizing:border-box">
                <label class="modal-sub" style="display:block;margin-bottom:6px">Thuộc chi nhánh</label>
                <select class="modal-textarea" id="selCN" required style="margin-bottom:14px;width:100%;box-sizing:border-box">
                    <option value="" disabled selected>— Chọn chi nhánh —</option>
                </select>
                <button type="submit" class="btn-confirm-reject"
                        style="background:var(--hr);color:#fff;padding:10px 14px;font-size:12px;border-radius:8px;border:none;cursor:pointer;width:100%">
                    Lưu phòng ban
                </button>
            </form>
        </div>
        <div class="card">
            <div class="card-hd">
                <div class="card-title"><i class="fa-solid fa-table-list" style="color:var(--hr);margin-right:6px"></i>Danh sách</div>
            </div>
            <table class="rank-table" style="width:100%">
                <thead>
                <tr><th>ID</th><th>Tên</th><th>Chi nhánh</th><th style="min-width:120px">Thao tác</th></tr>
                </thead>
                <tbody id="tableBody">
                <tr><td colspan="4"><div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Đang tải...</p></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="editPbModal">
        <div class="modal-box" style="max-width:420px">
            <div class="modal-title"><i class="fa-solid fa-pen" style="color:var(--hr);margin-right:6px"></i>Sửa phòng ban</div>
            <input type="hidden" id="edit-pb-id">
            <label class="modal-sub" style="display:block;margin-bottom:4px">Tên phòng ban</label>
            <input type="text" class="modal-textarea" id="edit-pb-ten" style="margin-bottom:10px;width:100%;box-sizing:border-box">
            <label class="modal-sub" style="display:block;margin-bottom:4px">Thuộc chi nhánh</label>
            <select class="modal-textarea" id="edit-pb-cn" style="margin-bottom:14px;width:100%;box-sizing:border-box"></select>
            <div class="modal-footer" style="display:flex;gap:10px;justify-content:flex-end">
                <button type="button" class="btn-cancel" onclick="closeEditPb()">Hủy</button>
                <button type="button" class="btn-confirm-reject" style="background:var(--hr);color:#fff;padding:8px 14px;border:none;border-radius:8px;cursor:pointer" onclick="saveEditPb()">Lưu</button>
            </div>
        </div>
    </div>

</th:block>

<script th:fragment="custom-scripts">
    function tick() {
        const d = new Date();
        const days = ['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'];
        document.getElementById('dateTime').textContent = days[d.getDay()] + ', ' +
            String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear() +
            ' — ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }
    async function apiFetch(url, options = {}) {
        const response = await fetch(url, { headers: getAuthHeaders(), ...options });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response;
    }
    async function loadData() {
        const tbody = document.getElementById('tableBody');
        const selCN = document.getElementById('selCN');
        try {
            const chiNhanhs = await (await apiFetch('/api/organizations/chi-nhanh')).json();
            while (selCN.options.length > 1) selCN.remove(1);
            chiNhanhs.forEach(cn => {
                const o = document.createElement('option');
                o.value = cn.id;
                o.textContent = cn.tenChiNhanh;
                selCN.appendChild(o);
            });
            const phongBans = await (await apiFetch('/api/organizations/phong-ban')).json();
            if (!phongBans.length) {
                tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><p>Chưa có phòng ban</p></div></td></tr>';
                return;
            }
            tbody.innerHTML = phongBans.map(pb => {
                const cnId = pb.chiNhanh && pb.chiNhanh.id ? pb.chiNhanh.id : '';
                return `<tr>
                    <td><strong>${pb.id}</strong></td>
                    <td>${pb.tenPhongBan}</td>
                    <td>${pb.chiNhanh ? pb.chiNhanh.tenChiNhanh : '—'}</td>
                    <td>
                        <button type="button" class="qa-approve" style="font-size:11px;padding:4px 8px" onclick='openEditPb(${JSON.stringify(pb.id)}, ${JSON.stringify(pb.tenPhongBan)}, ${JSON.stringify(cnId)})'>Sửa</button>
                        <button type="button" class="qa-reject" style="font-size:11px;padding:4px 8px" onclick='deletePb(${JSON.stringify(pb.id)})'>Xóa</button>
                    </td>
                </tr>`;
            }).join('');
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><p>Lỗi tải dữ liệu</p></div></td></tr>';
        }
    }
    async function openEditPb(id, ten, chiNhanhId) {
        document.getElementById('edit-pb-id').value = id;
        document.getElementById('edit-pb-ten').value = ten || '';
        const sel = document.getElementById('edit-pb-cn');
        sel.innerHTML = '';
        const chiNhanhs = await (await apiFetch('/api/organizations/chi-nhanh')).json();
        chiNhanhs.forEach(cn => sel.appendChild(new Option(cn.tenChiNhanh, cn.id)));
        if (chiNhanhId) sel.value = chiNhanhId;
        document.getElementById('editPbModal').classList.add('show');
    }
    function closeEditPb() {
        document.getElementById('editPbModal').classList.remove('show');
    }
    async function saveEditPb() {
        const id = document.getElementById('edit-pb-id').value;
        const tenPhongBan = document.getElementById('edit-pb-ten').value.trim();
        const cn = document.getElementById('edit-pb-cn').value;
        if (!tenPhongBan || !cn) { toast('Tên và chi nhánh là bắt buộc', 'warning'); return; }
        try {
            await apiFetch('/api/organizations/phong-ban/' + encodeURIComponent(id), {
                method: 'PUT',
                body: JSON.stringify({ tenPhongBan, chiNhanh: { id: cn } })
            });
            toast('Đã cập nhật phòng ban', 'success');
            closeEditPb();
            await loadData();
        } catch (e) {
            toast('Cập nhật thất bại', 'warning');
        }
    }
    async function deletePb(id) {
        if (!confirm('Xóa phòng ban ' + id + '? (Nhóm / NV / yêu cầu TD có thể bị ràng buộc)')) return;
        try {
            await apiFetch('/api/organizations/phong-ban/' + encodeURIComponent(id), { method: 'DELETE' });
            toast('Đã xóa', 'success');
            await loadData();
        } catch (e) {
            toast('Không xóa được', 'warning');
        }
    }
    document.getElementById('formAddPB').addEventListener('submit', async function(e) {
        e.preventDefault();
        const data = {
            tenPhongBan: document.getElementById('tenPB').value,
            chiNhanh: { id: document.getElementById('selCN').value }
        };
        try {
            await apiFetch('/api/organizations/phong-ban', { method: 'POST', body: JSON.stringify(data) });
            toast('Đã thêm phòng ban', 'success');
            document.getElementById('tenPB').value = '';
            await loadData();
        } catch (err) {
            toast('Không thêm được', 'warning');
        }
    });
    document.addEventListener('DOMContentLoaded', () => { tick(); loadData(); });
</script>

</body>
</html>
