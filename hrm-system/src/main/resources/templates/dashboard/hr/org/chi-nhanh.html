<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/dashboard-layout :: html(content=~{::page-content}, styles=~{dashboard/hr :: custom-styles}, scripts=~{::custom-scripts})}"
      lang="vi">
<head>
    <title>HR - Chi nhánh</title>
</head>
<body>

<th:block th:fragment="page-content">

    <div class="hr-banner">
        <div class="hb-left">
            <h2><i class="fa-solid fa-building" style="margin-right:8px;opacity:.8"></i>Quản lý chi nhánh</h2>
            <p>Thêm, sửa, xóa chi nhánh (REST <code>/api/organizations/chi-nhanh</code>).</p>
            <div class="hb-date" id="dateTime">...</div>
        </div>
    </div>

    <th:block th:replace="~{fragments/hr-subnav :: subnav}"></th:block>
    <th:block th:replace="~{fragments/hr-org-subnav :: org-subnav}"></th:block>

    <div class="g2" style="align-items:start">
        <div class="card">
            <div class="card-hd">
                <div class="card-title"><i class="fa-solid fa-plus" style="color:var(--hr);margin-right:6px"></i>Thêm chi nhánh</div>
            </div>
            <form id="formAdd">
                <label class="modal-sub" style="display:block;margin-bottom:6px">Tên chi nhánh</label>
                <input type="text" class="modal-textarea" id="name" required style="margin-bottom:10px;width:100%;box-sizing:border-box">
                <label class="modal-sub" style="display:block;margin-bottom:6px">Địa chỉ</label>
                <input type="text" class="modal-textarea" id="address" required style="margin-bottom:14px;width:100%;box-sizing:border-box">
                <button type="submit" class="btn-confirm-reject"
                        style="background:var(--hr);color:#fff;padding:10px 14px;font-size:12px;border-radius:8px;border:none;cursor:pointer;width:100%">
                    Lưu
                </button>
            </form>
        </div>
        <div class="card">
            <div class="card-hd">
                <div class="card-title"><i class="fa-solid fa-table-list" style="color:var(--hr);margin-right:6px"></i>Danh sách</div>
            </div>
            <table class="rank-table" style="width:100%">
                <thead>
                <tr><th>ID</th><th>Tên</th><th>Địa chỉ</th><th style="min-width:120px">Thao tác</th></tr>
                </thead>
                <tbody id="tableBody">
                <tr><td colspan="4"><div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Đang tải...</p></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="editCnModal">
        <div class="modal-box" style="max-width:420px">
            <div class="modal-title"><i class="fa-solid fa-pen" style="color:var(--hr);margin-right:6px"></i>Sửa chi nhánh</div>
            <input type="hidden" id="edit-cn-id">
            <label class="modal-sub" style="display:block;margin-bottom:4px">Tên chi nhánh</label>
            <input type="text" class="modal-textarea" id="edit-cn-name" style="margin-bottom:10px;width:100%;box-sizing:border-box">
            <label class="modal-sub" style="display:block;margin-bottom:4px">Địa chỉ</label>
            <input type="text" class="modal-textarea" id="edit-cn-addr" style="margin-bottom:14px;width:100%;box-sizing:border-box">
            <div class="modal-footer" style="display:flex;gap:10px;justify-content:flex-end">
                <button type="button" class="btn-cancel" onclick="closeEditCn()">Hủy</button>
                <button type="button" class="btn-confirm-reject" style="background:var(--hr);color:#fff;padding:8px 14px;border:none;border-radius:8px;cursor:pointer" onclick="saveEditCn()">Lưu</button>
            </div>
        </div>
    </div>

</th:block>

<script th:fragment="custom-scripts">
    function tick() {
        const d = new Date();
        const days = ['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'];
        document.getElementById('dateTime').textContent = days[d.getDay()] + ', ' +
            String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear() +
            ' — ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }
    async function apiFetch(url, options = {}) {
        const response = await fetch(url, { headers: getAuthHeaders(), ...options });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response;
    }
    async function load() {
        const tbody = document.getElementById('tableBody');
        try {
            const data = await (await apiFetch('/api/organizations/chi-nhanh')).json();
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><p>Chưa có chi nhánh</p></div></td></tr>';
                return;
            }
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td><strong>${item.id}</strong></td>
                    <td>${item.tenChiNhanh}</td>
                    <td>${item.diaChi || '—'}</td>
                    <td>
                        <button type="button" class="qa-approve" style="font-size:11px;padding:4px 8px" onclick='openEditCn(${JSON.stringify(item.id)}, ${JSON.stringify(item.tenChiNhanh)}, ${JSON.stringify(item.diaChi || "")})'>Sửa</button>
                        <button type="button" class="qa-reject" style="font-size:11px;padding:4px 8px" onclick='deleteCn(${JSON.stringify(item.id)})'>Xóa</button>
                    </td>
                </tr>`).join('');
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><p>Lỗi tải dữ liệu</p></div></td></tr>';
        }
    }
    function openEditCn(id, ten, diaChi) {
        document.getElementById('edit-cn-id').value = id;
        document.getElementById('edit-cn-name').value = ten || '';
        document.getElementById('edit-cn-addr').value = diaChi || '';
        document.getElementById('editCnModal').classList.add('show');
    }
    function closeEditCn() {
        document.getElementById('editCnModal').classList.remove('show');
    }
    async function saveEditCn() {
        const id = document.getElementById('edit-cn-id').value;
        const tenChiNhanh = document.getElementById('edit-cn-name').value.trim();
        const diaChi = document.getElementById('edit-cn-addr').value.trim();
        if (!tenChiNhanh) { toast('Tên chi nhánh không được để trống', 'warning'); return; }
        try {
            await apiFetch('/api/organizations/chi-nhanh/' + encodeURIComponent(id), {
                method: 'PUT',
                body: JSON.stringify({ tenChiNhanh, diaChi })
            });
            toast('Đã cập nhật chi nhánh', 'success');
            closeEditCn();
            await load();
        } catch (e) {
            toast('Cập nhật thất bại (có thể bị ràng buộc dữ liệu)', 'warning');
        }
    }
    async function deleteCn(id) {
        if (!confirm('Xóa chi nhánh ' + id + '? Các phòng ban thuộc chi nhánh có thể lỗi ràng buộc.')) return;
        try {
            await apiFetch('/api/organizations/chi-nhanh/' + encodeURIComponent(id), { method: 'DELETE' });
            toast('Đã xóa', 'success');
            await load();
        } catch (e) {
            toast('Không xóa được (còn phòng ban hoặc NV liên quan)', 'warning');
        }
    }
    document.getElementById('formAdd').addEventListener('submit', async function(e) {
        e.preventDefault();
        try {
            await apiFetch('/api/organizations/chi-nhanh', {
                method: 'POST',
                body: JSON.stringify({
                    tenChiNhanh: document.getElementById('name').value,
                    diaChi: document.getElementById('address').value
                })
            });
            toast('Đã thêm chi nhánh', 'success');
            document.getElementById('name').value = '';
            document.getElementById('address').value = '';
            await load();
        } catch (err) {
            toast('Không thêm được (kiểm tra quyền hoặc dữ liệu)', 'warning');
        }
    });
    document.addEventListener('DOMContentLoaded', () => { tick(); load(); });
</script>

</body>
</html>
